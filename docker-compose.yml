services:
  mongodb:
    image: mongo:latest
    container_name: luci-ui-db
    ports:
      - "27019:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=password123
      - MONGO_INITDB_DATABASE=luci-ui

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: luci-ui-web
    ports:
      - "9000:9000"
    env_file:
      - .env.local
      - .env
    depends_on:
      - mongodb

volumes:
  mongodb_data:
